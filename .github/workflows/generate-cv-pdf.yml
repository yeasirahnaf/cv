name: Generate CV PDF

on: 
  push:
    branches:   
      - main
    paths:  
      - 'README. md'
      - 'Yeasir_Ahnaf_CV.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf: 
    runs-on: ubuntu-latest
    
    steps: 
      - name: Checkout repository
        uses:  actions/checkout@v4
      
      - name: Convert Markdown to PDF
        uses: jaywcjlove/markdown-to-pdf-action@main
        with:
          source:  README.md
          output: Yeasir_Ahnaf_CV.pdf
          
      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:  
          name: CV-PDF
          path: Yeasir_Ahnaf_CV. pdf
          retention-days: 90
      
      - name:  Commit PDF to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply. github.com"
          git config --local user.name "github-actions[bot]"
          git add Yeasir_Ahnaf_CV.pdf
          git diff --staged --quiet || git commit -m "Auto-generate CV PDF [skip ci]"
          git push
