name: Generate CV PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Yeasir_Ahnaf_CV.md'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Generate PDF
      run: npm run build

    - name: Commit PDF
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update generated PDF [skip ci]"
        file_pattern: "*.pdf"
